plugins {
    id "com.android.application"
    id "kotlin-android"
    // Flutter Gradle Plugin must be applied after Android/Kotlin plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

android {
    namespace = "com.abss.boxtrace_pda"
    compileSdk = 34

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId = "com.abss.boxtrace_pda"
        // Zebra RFIDAPI3 needs a recent Android; MC3390R ships Android 10/11.
        minSdk = 24
        targetSdk = 34
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    buildTypes {
        release {
            // Signed with debug keys so `flutter run --release` works out of the box.
            signingConfig = signingConfigs.debug
            // Flutter's release build type shrinks/minifies by default, which
            // makes R8 walk the whole class graph including rfidapi3lib's
            // optional Qualcomm integration — proguard-rules.pro tells it
            // those classes are legitimately absent, not a build error.
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source = "../.."
}

// The Zebra RFID API3 library ships as a local .aar in app/libs.
repositories {
    flatDir {
        dirs "libs"
    }
}

dependencies {
    implementation(name: "rfidapi3lib-2.0.5.275", ext: "aar")
    implementation "com.google.code.gson:gson:2.13.2"
    implementation "androidx.core:core-ktx:1.13.1"
}
