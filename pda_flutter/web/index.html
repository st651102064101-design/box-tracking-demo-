<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="boxtrace_pda">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>boxtrace_pda</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Flutter's own view sizes itself as a percentage of its container, so
       without an explicit height chain from html -> body it can end up
       shorter than the viewport, and any browser window wider than the
       app's own 560px phone-frame (see RootScreen) shows raw, unstyled body
       background outside it — black under Safari's dark-mode default UA
       style, since nothing here ever painted over it. Filling the full
       viewport with the app's own background color keeps that surround
       correct at any window size instead of relying on Flutter to have
       painted there first. */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      background: #f5f5f7;
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
